name: Bringup Regression

on:
  pull_request:
    branches:
      - "**"

jobs:
  regress-cpu-bringup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Verilator
        run: sudo apt-get update && sudo apt-get install -y verilator

      - name: Run bringup regression
        shell: bash
        run: |
          source env.sh
          run regress_cpu_bringup -j 2

      - name: Upload regression artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regress-cpu-bringup-rundir
          path: rundir/regress_cpu_bringup/**
          if-no-files-found: warn
